<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
            orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 9 4.5, 0 9" fill="rgba(255,255,255,0.92)"/>
    </marker>
  </defs>

  <!-- Fond arrondi dégradé violet -->
  <rect width="64" height="64" rx="14" fill="url(#g)"/>

  <!-- Arc circulaire 300° dans le sens horaire (gap à droite, 1h–4h) -->
  <!-- Cercle centre (32,32), rayon 18 -->
  <!-- Départ angle 30° → (47.6, 41) ; Arrivée angle 330° → (47.6, 23) -->
  <path d="M 47.6,41 A 18,18 0 1 1 47.6,23"
        fill="none"
        stroke="rgba(255,255,255,0.88)"
        stroke-width="3.6"
        stroke-linecap="round"
        marker-end="url(#arw)"/>

  <!-- Coche blanche audacieuse à l'intérieur -->
  <path d="M 21,33 L 29,41 L 43,23"
        fill="none"
        stroke="white"
        stroke-width="4.8"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
